// ── IMPORTAR PRODUTOS CSV ────────────────────────────────────────────────
function importarProdutosCSV(e){
  const file=e.target.files[0];
  if(!file) return;
  const tryRead=(enc)=>new Promise(res=>{
    const r=new FileReader();
    r.onload=ev=>res(ev.target.result);
    r.onerror=()=>res(null);
    r.readAsText(file,enc);
  });
  (async()=>{
    let text=await tryRead('UTF-8');
    if(text&&text.includes('\uFFFD')) text=await tryRead('windows-1252');
    if(!text){toast('Não foi possível ler o arquivo.',false);return;}
    try{
      const lines=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(l=>l.trim());
      if(lines.length<2){toast('Arquivo vazio.',false);return;}
      const sep=lines[0].includes(';')?';':',';
      const header=lines[0].split(sep).map(h=>h.trim().toLowerCase().replace(/"/g,''));
      const find=(pats)=>header.findIndex(h=>pats.some(p=>h.includes(p)));
      const idx={
        nome:find(['nome','name','produto','descri']),
        marca:find(['marca','brand','fabric']),
        categoria:find(['categ','type','tipo']),
        linha:find(['linha','fragran','line']),
        preco:find(['preco','preço','price','venda']),
        custo:find(['custo','cost','compra']),
        codigo:find(['codigo','código','sku','ref']),
        barras:find(['barras','ean','gtin','barc']),
      };
      if(idx.nome<0){toast('Coluna "Nome" não encontrada no CSV.',false);return;}
      const dataRows=lines.slice(1).filter(l=>l.trim()).map(l=>{
        const cols=[];let f='',inQ=false;
        for(const c of l){
          if(c==='"') inQ=!inQ;
          else if(c===sep&&!inQ){cols.push(f.trim());f='';}
          else f+=c;
        }
        cols.push(f.trim());
        return cols;
      }).filter(r=>r[idx.nome]);
      if(!dataRows.length){toast('Nenhum produto encontrado.',false);return;}
      const preview=dataRows.slice(0,3).map(r=>`
        <div style="padding:.35rem 0;border-bottom:1px solid #2e1f4a;font-size:.8rem">
          <span style="color:#e2c9ff;font-weight:600">${r[idx.nome]||'—'}</span>
          ${idx.marca>=0&&r[idx.marca]?`<span style="color:#7c5fa0;margin-left:.4rem">${r[idx.marca]}</span>`:''}
          ${idx.preco>=0&&r[idx.preco]?`<span style="color:#22c55e;margin-left:.4rem">${r[idx.preco]}</span>`:''}
        </div>`).join('');
      window._csvProd={dataRows,idx};
      openModal(`
        <div class="modal-head"><span class="modal-title">📥 Importar ${dataRows.length} Produtos</span><button class="close-btn" onclick="closeModal()">×</button></div>
        <div style="font-size:.75rem;color:#7c5fa0;margin-bottom:.5rem;line-height:1.6">
          ✓ Nome${idx.marca>=0?'<br>✓ Marca':''}${idx.categoria>=0?'<br>✓ Categoria':''}${idx.linha>=0?'<br>✓ Linha':''}${idx.preco>=0?'<br>✓ Preço':''}${idx.barras>=0?'<br>✓ Código de barras':''}
        </div>
        <div style="background:#0f0a1e;border-radius:.5rem;padding:.5rem .75rem;margin-bottom:.75rem">${preview}
          ${dataRows.length>3?`<div style="font-size:.72rem;color:#7c5fa0;margin-top:.35rem">+${dataRows.length-3} mais…</div>`:''}
        </div>
        <div style="font-size:.75rem;color:#7c5fa0;margin-bottom:.875rem">Duplicados pelo nome serão ignorados automaticamente.</div>
        <div class="modal-btns">
          <button class="btn-primary" style="flex:1" onclick="confirmarImportProdutos()">✅ Importar tudo</button>
          <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
        </div>`);
    }catch(err){toast('Erro ao processar CSV: '+err.message,false);}
  })();
  e.target.value='';
}

function confirmarImportProdutos(){
  const {dataRows,idx}=window._csvProd||{dataRows:[],idx:{}};
  let importados=0,duplicados=0;
  dataRows.forEach((cols,n)=>{
    const nome=(cols[idx.nome]||'').trim();
    if(!nome) return;
    if(DB.produtos.find(p=>p.nome.toLowerCase()===nome.toLowerCase())){duplicados++;return;}
    DB.produtos.push({
      id:Date.now()+n,
      codigoBarras:idx.barras>=0?(cols[idx.barras]||'').trim():'',
      codigo:idx.codigo>=0?(cols[idx.codigo]||'').trim():'',
      nome,
      marca:idx.marca>=0?(cols[idx.marca]||'').trim():'',
      categoria:idx.categoria>=0?(cols[idx.categoria]||'').trim():'',
      linha:idx.linha>=0?(cols[idx.linha]||'').trim():'',
      precoVenda:parseFloat((cols[idx.preco]||'').replace(',','.'))||0,
      foto:'',precoPromocional:0,validadePromocao:''
    });
    importados++;
  });
  window._csvProd=null;
  salvar(DB); closeModal(); renderProdutos();
  toast(`✅ ${importados} produto(s) importado(s)${duplicados?` · ${duplicados} ignorado(s)`:''}`);
  try{navigator.vibrate&&navigator.vibrate([50,30,50]);}catch(e){}
}

// ── RELATÓRIO ANUAL ───────────────────────────────────────────────────────
function abrirRelatorioAnual(){
  const anos=[...new Set(DB.vendas.map(v=>(v.data||'').slice(0,4)).filter(Boolean))].sort().reverse();
  if(!anos.length){toast('Sem dados para relatório anual.',false);return;}
  const anoSel=anos[0];
  const mesesNomes=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const dadosMensais=mesesNomes.map((nome,i)=>{
    const key=`${anoSel}-${String(i+1).padStart(2,'0')}`;
    const vendas=DB.vendas.filter(v=>(v.data||'').startsWith(key));
    const receitas=DB.financeiro.filter(t=>t.tipo==='Receita'&&t.status==='Recebido'&&(t.data||'').startsWith(key)).reduce((s,t)=>s+t.valor,0);
    const despesas=DB.financeiro.filter(t=>t.tipo==='Despesa'&&t.status==='Pago'&&(t.data||'').startsWith(key)).reduce((s,t)=>s+t.valor,0);
    return{nome,key,qtdVendas:vendas.length,totalVendas:vendas.reduce((s,v)=>s+v.total,0),receitas,despesas,saldo:receitas-despesas};
  });
  const totalAnual=dadosMensais.reduce((s,m)=>s+m.totalVendas,0);
  const receitaAnual=dadosMensais.reduce((s,m)=>s+m.receitas,0);
  const despesaAnual=dadosMensais.reduce((s,m)=>s+m.despesas,0);
  const maxVenda=Math.max(...dadosMensais.map(m=>m.totalVendas),1);
  const barras=dadosMensais.map(m=>{
    const h=Math.max(4,Math.round((m.totalVendas/maxVenda)*60));
    const isFut=new Date(m.key+'-01')>new Date();
    return`<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
      <div style="width:100%;height:${h}px;background:${isFut?'#2e1f4a':'linear-gradient(180deg,#d946ef,#9333ea)'};border-radius:3px 3px 0 0" title="${fmt(m.totalVendas)}"></div>
      <div style="font-size:.52rem;color:#7c5fa0">${m.nome}</div>
    </div>`;}).join('');
  const tabela=dadosMensais.filter(m=>m.qtdVendas>0||m.receitas>0).map(m=>`
    <div style="display:grid;grid-template-columns:1.2fr 1fr 1fr 1fr;gap:.2rem;padding:.4rem 0;border-bottom:1px solid #2e1f4a;font-size:.75rem">
      <span style="color:#a78bc0;font-weight:700">${m.nome}</span>
      <span style="color:#22c55e;text-align:right">${fmt(m.totalVendas)}</span>
      <span style="color:#e2c9ff;text-align:right">${fmt(m.receitas)}</span>
      <span style="color:${m.saldo>=0?'#22c55e':'#ef4444'};text-align:right;font-weight:700">${fmt(m.saldo)}</span>
    </div>`).join('');
  openModal(`
    <div class="modal-head"><span class="modal-title">📅 Relatório ${anoSel}</span><button class="close-btn" onclick="closeModal()">×</button></div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:.4rem;margin-bottom:.875rem">
      <div style="background:#0f0a1e;border-radius:.5rem;padding:.55rem;text-align:center">
        <div style="font-size:.6rem;color:#7c5fa0;text-transform:uppercase">Vendas</div>
        <div style="font-size:.9rem;font-weight:800;color:#22c55e">${fmt(totalAnual)}</div>
      </div>
      <div style="background:#0f0a1e;border-radius:.5rem;padding:.55rem;text-align:center">
        <div style="font-size:.6rem;color:#7c5fa0;text-transform:uppercase">Receitas</div>
        <div style="font-size:.9rem;font-weight:800;color:#22c55e">${fmt(receitaAnual)}</div>
      </div>
      <div style="background:#0f0a1e;border-radius:.5rem;padding:.55rem;text-align:center">
        <div style="font-size:.6rem;color:#7c5fa0;text-transform:uppercase">Saldo</div>
        <div style="font-size:.9rem;font-weight:800;color:${receitaAnual-despesaAnual>=0?'#22c55e':'#ef4444'}">${fmt(receitaAnual-despesaAnual)}</div>
      </div>
    </div>
    <div style="display:flex;align-items:flex-end;gap:3px;height:72px;margin-bottom:.75rem">${barras}</div>
    <div style="display:grid;grid-template-columns:1.2fr 1fr 1fr 1fr;font-size:.6rem;color:#7c5fa0;text-transform:uppercase;letter-spacing:.04em;margin-bottom:.3rem;padding:0 .1rem">
      <span>Mês</span><span style="text-align:right">Vendas</span><span style="text-align:right">Receitas</span><span style="text-align:right">Saldo</span>
    </div>
    <div style="max-height:40vh;overflow-y:auto">${tabela||'<div class="empty">Sem movimentação este ano.</div>'}</div>
    <div class="modal-btns"><button class="btn-ghost" style="flex:1" onclick="closeModal()">Fechar</button><button class="btn-ghost" onclick="imprimirRelatorio()">🖨️ PDF</button></div>`);
}

// ── COMPARTILHAR PRODUTO ──────────────────────────────────────────────────
function compartilharProduto(id){
  const p=DB.produtos.find(x=>x.id===id);
  if(!p) return;
  const agora=new Date();
  const promoAtiva=p.precoPromocional>0&&(!p.validadePromocao||new Date(p.validadePromocao+'T23:59:59')>agora);
  const preco=promoAtiva?p.precoPromocional:p.precoVenda;
  const texto=`🌸 *${p.nome}*\n${p.marca}${p.linha?' · '+p.linha:''}\n\n💰 *${fmt(preco)}*${promoAtiva?' 🔥 Promoção!':''}\n\n📲 Faça seu pedido comigo!`;
  const share=async()=>{
    if(p.foto&&navigator.share){
      try{
        const r=await fetch(p.foto);
        const blob=await r.blob();
        const file=new File([blob],'produto.jpg',{type:'image/jpeg'});
        if(navigator.canShare&&navigator.canShare({files:[file]})){
          await navigator.share({title:p.nome,text:texto,files:[file]});
          return;
        }
      }catch(e){}
    }
    if(navigator.share){
      try{ await navigator.share({title:p.nome,text:texto}); return; }catch(e){}
    }
    window.open('https://wa.me/?text='+encodeURIComponent(texto),'_blank');
  };
  share();
}

// ── SENHA ─────────────────────────────────────────────────────────────────
async function hashSenha(s){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function configurarSenha(){
  const temSenha=!!getConfig().senhaHash;
  openModal(`
    <div class="modal-head"><span class="modal-title">🔒 Senha de Acesso</span><button class="close-btn" onclick="closeModal()">×</button></div>
    ${temSenha?'<div style="font-size:.82rem;color:#7c5fa0;margin-bottom:.75rem">Senha ativa. Digite nova para alterar ou deixe vazio para remover.</div>':''}
    <div class="field"><label>Nova senha</label><input type="password" id="nova-senha" placeholder="Mínimo 4 caracteres…"/></div>
    <div class="field"><label>Confirmar senha</label><input type="password" id="conf-senha" placeholder="Repita a senha…"/></div>
    <div class="modal-btns">
      <button class="btn-primary" onclick="salvarSenha()">Salvar</button>
      ${temSenha?'<button class="btn-danger" onclick="removerSenha()">Remover</button>':''}
      <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
    </div>`);
}

async function salvarSenha(){
  const nova=document.getElementById('nova-senha').value;
  const conf=document.getElementById('conf-senha').value;
  if(!nova){removerSenha();return;}
  if(nova!==conf){toast('Senhas não coincidem.',false);return;}
  if(nova.length<4){toast('Mínimo 4 caracteres.',false);return;}
  const hash=await hashSenha(nova);
  setConfig('senhaHash',hash);
  closeModal(); toast('Senha configurada! 🔒');

    ?`https://wa.me/55${num}?text=${encodeURIComponent(texto)}`

  const texto=t.texto
    .replace(/\[NOME\]/g,cliNome||'cliente')
    .replace(/\[DATA\]/g,hoje_);
  if(navigator.clipboard){

function agendarLembreteCiclo(cicloId){
  const c=DB.ciclos.find(x=>x.id===cicloId);
  if(!c||!c.dataEntrega) return;
  const d=new Date(c.dataEntrega+'T08:00:00');
  if(d<new Date()){toast('Data de entrega já passou.',false);return;}
  if(!('Notification' in window)||Notification.permission!=='granted'){
    toast('Ative as notificações para receber lembretes.',false);
    return;
  }
  const ms=d-new Date();
  setTimeout(()=>{
    new Notification(`📦 Entrega: ${c.ciclo}`,{
      body:`O pedido ${c.ciclo} da ${c.marca} deve chegar hoje!`
    });
  },ms);
  toast(`Lembrete agendado para ${fmtD(c.dataEntrega)}!`);
}

function preencherMargemNF(){
  const nome=document.getElementById('nf-prod-nome').value.trim();
  const prod=DB.produtos.find(p=>p.nome===nome);

  const margemEl=document.getElementById('nf-prod-margem');

  if(margemEl&&!margemEl.value) margemEl.value=margemPadraoMarca(prod.marca);
  // try to fill last cost
  if(custoEl&&!custoEl.value){
    const ultimo=[...DB.lotes].reverse().find(l=>l.nome===prod.nome&&l.precoCusto);
    if(ultimo) custoEl.value=ultimo.precoCusto;
  }

function adicionarItemNF(){
  const nome=document.getElementById('nf-prod-nome').value.trim();
  const qtd=parseInt(document.getElementById('nf-prod-qtd').value)||0;
  const custo=parseFloat(document.getElementById('nf-prod-custo').value)||0;
  const validade=document.getElementById('nf-prod-val').value||'';
  const margem=parseFloat(document.getElementById('nf-prod-margem').value)||MARGEM_MINIMA;

  if(!nome){toast('Digite o nome do produto.',false);return;}
  if(qtd<=0){toast('Quantidade deve ser maior que zero.',false);return;}
  if(custo<=0){toast('Digite o custo unitário.',false);return;}

  // check if produto exists, if not offer to create
  const prod=DB.produtos.find(p=>p.nome===nome);
  if(!prod){
    if(!confirm(`Produto "${nome}" não está cadastrado. Deseja cadastrá-lo agora?`)) return;
    // auto-create minimal product
    const fornecedor=document.getElementById('nf-fornecedor')?.value||'';
    DB.produtos.push({
      id:Date.now(),nome,marca:fornecedor,categoria:'',linha:'',
      precoVenda:0,foto:'',precoPromocional:0,validadePromocao:'',codigoBarras:'',codigo:''
    });
    salvar(DB);
    toast(`Produto "${nome}" cadastrado. Complete o cadastro depois.`);
  }

  _nfItens.push({nome,qtd,custo,validade,margem});
  abrirModalNF(); // refresh with updated list
  toast(`${nome} adicionado!`);
}

function removerItemNF(idx){
  _nfItens.splice(idx,1);

}

function salvarNotaFiscal(){
  if(_nfItens.length===0){toast('Adicione ao menos um produto.',false);return;}
  const nfNum=document.getElementById('nf-numero')?.value?.trim()||'';
  const dataCompra=document.getElementById('nf-data')?.value||hoje();
  const fornecedor=document.getElementById('nf-fornecedor')?.value||'';

  let count=0;
  _nfItens.forEach(it=>{
    const prod=DB.produtos.find(p=>p.nome===it.nome)||{codigoBarras:'',codigo:''};
    const precoMin=+(it.custo*(1+it.margem/100)).toFixed(2);
    const id=uid('LOTE');
    DB.lotes.push({
      id,dataCompra,
      codigoBarras:prod.codigoBarras||'',
      codigo:prod.codigo||'',
      nome:it.nome,
      validade:it.validade,
      qtdComprada:it.qtd,
      precoCusto:it.custo,
      margem:it.margem,
      precoMin,
      obs:fornecedor?`Fornecedor: ${fornecedor}`:'',
      nf:nfNum,
    });

    // auto-launch to financeiro
    DB.financeiro.push({
      id:uid('TRN'),
      data:dataCompra,
      tipo:'Despesa',
      categoria:'Compra de Mercadoria',
      valor:+(it.custo*it.qtd).toFixed(2),
      status:'Pendente',
      forma:'—',
      obs:nfNum?`NF ${nfNum} · ${it.nome}`:`${it.nome}`
    });
    count++;
  });

  salvar(DB);
  _nfItens=[];
  closeModal();
  renderEstoque();
  toast(`✅ ${count} lote(s) registrado(s)${nfNum?' — NF '+nfNum:''}!`);
  try{navigator.vibrate&&navigator.vibrate([50,30,50]);}catch(e){}
}

      </div>`).join('')}
    <div style="font-size:.75rem;color:#a78bc0;padding:.35rem 0;border-top:1px solid #2e1f4a;margin-top:.25rem">
      ${_erItens.reduce((s,it)=>s+it.qtd,0)} unidades no total
    </div>` : '';

  openModal(`
    <div class="modal-head">
      <span class="modal-title">⚡ Entrada Rápida</span>
      <button class="close-btn" onclick="closeModal()">×</button>
    </div>
    <div style="font-size:.78rem;color:#7c5fa0;margin-bottom:.875rem">
      Digite o nome do produto, quantidade e validade. Se for novo, será cadastrado automaticamente.
    </div>

    <div style="background:#0f0a1e;border-radius:.75rem;padding:.875rem;margin-bottom:.75rem">
      <div style="font-size:.75rem;color:#a78bc0;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.6rem">Produto</div>
      ${fieldDatalist('Nome do produto','er-nome',nomesExist,true)}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem">
        <div>${field('Marca (se novo)','er-marca','text',marcas,false)}</div>
        <div>${field('Categoria','er-cat','text',CATEGORIAS,false)}</div>
      </div>
      <div style="font-size:.72rem;color:#3d2a5e;margin-top:-.4rem;margin-bottom:.6rem">
        💡 Marca e categoria só são necessárias para produtos novos
      </div>

      <div style="font-size:.75rem;color:#a78bc0;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.6rem;margin-top:.25rem">Quantidade e Validade</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem">
        <div>${field('Quantidade','er-qtd','number',null,true,'1')}</div>
        <div>${field('Validade','er-val','date',null,false)}</div>
      </div>

      <div style="font-size:.75rem;color:#a78bc0;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.6rem;margin-top:.25rem">Preço (opcional)</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.5rem">
        <div>${field('Custo unit. (R$)','er-custo','number',null,false)}</div>
        <div>${field('Preço venda (R$)','er-preco','number',null,false)}</div>
      </div>

      <button class="btn-ghost" style="width:100%;margin-top:.25rem" onclick="adicionarItemER()">
        + Adicionar à lista
      </button>
    </div>

    ${itensHtml}

    <div class="modal-btns">
      <button class="btn-primary" style="flex:1"
        onclick="salvarEntradaRapida()"
        ${_erItens.length===0?'disabled style="opacity:.4"':''}>
        ✅ Registrar ${_erItens.length > 0 ? _erItens.length + ' produto(s)' : ''}
      </button>
      <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
    </div>`);

  // Wire autocomplete: ao selecionar produto existente, preenche marca/categoria
  document.getElementById('er-nome').addEventListener('change', _preencherDadosER);
}

function _preencherDadosER(){
  const nome = document.getElementById('er-nome').value.trim();
  const prod = DB.produtos.find(p=>p.nome===nome);
  if(!prod) return;
  const marcaEl = document.getElementById('er-marca');
  const catEl = document.getElementById('er-cat');
  const custoEl = document.getElementById('er-custo');
  const precoEl = document.getElementById('er-preco');
  if(marcaEl && !marcaEl.value) marcaEl.value = prod.marca||'';
  if(catEl && !catEl.value) catEl.value = prod.categoria||'';
  if(precoEl && !precoEl.value && prod.precoVenda) precoEl.value = prod.precoVenda;
  // try last cost
  if(custoEl && !custoEl.value){
    const ultimo = [...DB.lotes].reverse().find(l=>l.nome===prod.nome&&l.precoCusto);
    if(ultimo) custoEl.value = ultimo.precoCusto;
  }
}

function adicionarItemER(){
  const nome = document.getElementById('er-nome').value.trim();
  const qtd = parseInt(document.getElementById('er-qtd').value)||0;
  const validade = document.getElementById('er-val').value||'';
  const custo = parseFloat(document.getElementById('er-custo').value)||0;
  const preco = parseFloat(document.getElementById('er-preco').value)||0;
  const marca = document.getElementById('er-marca').value.trim();
  const cat = document.getElementById('er-cat').value.trim();

  if(!nome){ toast('Digite o nome do produto.',false); return; }
  if(qtd<=0){ toast('Quantidade deve ser maior que zero.',false); return; }

  _erItens.push({nome, qtd, validade, custo, preco, marca, cat});
  toast(`${nome} adicionado!`);
  _renderEntradaRapida();
}

function removerItemER(idx){
  _erItens.splice(idx,1);
  _renderEntradaRapida();
}

function salvarEntradaRapida(){
  if(_erItens.length===0){ toast('Adicione ao menos um produto.',false); return; }
  const dataHoje = hoje();
  let criados=0, atualizados=0;

  _erItens.forEach((it,n)=>{
    // 1. Verificar se produto existe; se não, criar automaticamente
    let prod = DB.produtos.find(p=>p.nome.toLowerCase()===it.nome.toLowerCase());
    if(!prod){
      prod = {
        id: Date.now()+n,
        nome: it.nome,
        marca: it.marca||'',
        categoria: it.cat||'',
        linha: '',
        precoVenda: it.preco||0,
        precoPromocional: 0,
        validadePromocao: '',
        codigoBarras: '',
        codigo: '',
        foto: '',
      };
      DB.produtos.push(prod);
      criados++;
    } else {
      // Atualizar preço de venda se fornecido e não tinha
      if(it.preco>0 && !prod.precoVenda) prod.precoVenda = it.preco;
      atualizados++;
    }

    // 2. Calcular margem e preço mínimo
    const margem = margemPadraoMarca(prod.marca) || MARGEM_MINIMA;
    const precoMin = it.custo>0 ? +(it.custo*(1+margem/100)).toFixed(2) : (it.preco||0);

    // 3. Criar lote
    DB.lotes.push({
      id: uid('LOTE'),
      dataCompra: dataHoje,
      codigoBarras: prod.codigoBarras||'',
      codigo: prod.codigo||'',
      nome: prod.nome,
      validade: it.validade||'',
      qtdComprada: it.qtd,
      precoCusto: it.custo||0,
      margem,
      precoMin,
      obs: '',
      nf: '',
    });

    // 4. Lançar despesa no financeiro se tiver custo
    if(it.custo>0){
      DB.financeiro.push({
        id: uid('TRN'),
        data: dataHoje,
        tipo: 'Despesa',
        categoria: 'Compra de Mercadoria',
        valor: +(it.custo*it.qtd).toFixed(2),
        status: 'Pendente',
        forma: '—',
        obs: it.nome,
      });
    }
  });

  salvar(DB);
  _erItens=[];
  closeModal();
  renderEstoque();

  const msg = `✅ ${_erItens.length||'Produtos'} registrado(s)!${criados>0?' '+criados+' novo(s) produto(s) criado(s).':''}`;
  toast(`✅ Entrada registrada! ${criados>0?criados+' produto(s) novo(s) criado(s).':''}`);
  try{navigator.vibrate&&navigator.vibrate([50,30,50]);}catch(e){}
}

function init(){
  try {
    aplicarTema();
    renderNav();
    renderDashboard();
    // verificar aniversários ao abrir
    setTimeout(verificarAniversariosHoje, 2000);
    setTimeout(verificarReposicaoNotificacao, 3000);
    setTimeout(verificarListaEspera, 4000);
    // pull-to-refresh
    let ptrStart=0;
    document.addEventListener('touchstart',e=>{ ptrStart=e.touches[0].clientY; },{passive:true});
    document.addEventListener('touchend',e=>{
      const dy=e.changedTouches[0].clientY-ptrStart;
      if(dy>90&&window.scrollY===0){
        toast('Atualizado!');
        renderTab(currentTab);
      }
    },{passive:true});
  } catch(e) {
    document.getElementById('main').innerHTML = '<div style="color:#ef4444;padding:2rem;font-family:monospace">Erro ao iniciar: ' + e.message + '</div>';
    console.error('Init error:', e);
  }
}
if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}

</script>
</body>
</html>
